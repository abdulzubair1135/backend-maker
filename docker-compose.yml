version: '3.8'

services:
  # 1. Express API and Static Site Server
  web:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: wss_api_server
    restart: always
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=secure_mysql_root_password_2026
      - DB_NAME=wss_db
      - DB_PORT=3306
      - JWT_SECRET=websoft_solutions_secure_token_secret_2026_xyz
      - JWT_REFRESH_SECRET=websoft_solutions_secure_refresh_secret_2026_abc
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=300
    depends_on:
      - db
    volumes:
      - uploads_volume:/app/Uploads
      - logs_volume:/app/Logs
      - backups_volume:/app/Backups

  # 2. MySQL Database Container
  db:
    image: mysql:8.0
    container_name: wss_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secure_mysql_root_password_2026
      MYSQL_DATABASE: wss_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_volume:/var/lib/mysql
      - ./Database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  mysql_data_volume:
  uploads_volume:
  logs_volume:
  backups_volume:
