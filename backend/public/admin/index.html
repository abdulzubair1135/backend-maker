<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Control Panel - Websoft Solutions Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">
  <header class="admin-header glass">
    <div class="header-left">
      <div class="logo-badge">WSS</div>
      <div class="header-title">
        <h1>Websoft Solutions</h1>
        <span>Admin Control Panel (God Mode)</span>
      </div>
    </div>
    <div class="header-right">
      <span class="user-greeting">Welcome, <strong id="adminUsername">Admin</strong></span>
      <button id="logoutBtn" class="btn btn-secondary">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Logout
      </button>
    </div>
  </header>

  <main class="admin-main">
    <!-- Stats Section -->
    <section class="stats-grid">
      <div class="stat-card glass" data-status="All">
        <div class="stat-icon bg-purple">📊</div>
        <div class="stat-info">
          <h3>Total Leads</h3>
          <p id="statTotal">0</p>
        </div>
      </div>
      <div class="stat-card glass" data-status="Pending">
        <div class="stat-icon bg-amber">⏳</div>
        <div class="stat-info">
          <h3>Pending</h3>
          <p id="statPending">0</p>
        </div>
      </div>
      <div class="stat-card glass" data-status="Contacted">
        <div class="stat-icon bg-blue">📞</div>
        <div class="stat-info">
          <h3>Contacted</h3>
          <p id="statContacted">0</p>
        </div>
      </div>
      <div class="stat-card glass" data-status="Completed">
        <div class="stat-icon bg-green">✅</div>
        <div class="stat-info">
          <h3>Completed</h3>
          <p id="statCompleted">0</p>
        </div>
      </div>
    </section>

    <!-- Filters and Toolbar -->
    <section class="toolbar-section glass">
      <div class="filter-group">
        <label>Filter Category:</label>
        <div class="pill-group" id="categoryFilters">
          <button class="pill active" data-category="All">All Categories</button>
          <button class="pill" data-category="Contact Inquiry">Inquiries</button>
          <button class="pill" data-category="Audit Request">Audits</button>
          <button class="pill" data-category="DishTV Billing">DishTV</button>
          <button class="pill" data-category="OTT Subscription">OTT Billing</button>
        </div>
      </div>
      <div class="filter-group">
        <label>Filter Status:</label>
        <div class="pill-group" id="statusFilters">
          <button class="pill active" data-status="All">All Statuses</button>
          <button class="pill" data-status="Pending">Pending</button>
          <button class="pill" data-status="Contacted">Contacted</button>
          <button class="pill" data-status="Completed">Completed</button>
        </div>
      </div>
    </section>

    <!-- Leads List Section -->
    <section class="leads-section">
      <div class="section-header">
        <h2>Customer Inquiries & Billings (<span id="leadsCount">0</span>)</h2>
        <button id="refreshBtn" class="btn btn-primary">
          <svg class="icon animate-spin-hover" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
          Refresh
        </button>
      </div>

      <div id="leadsList" class="leads-list">
        <!-- Lead items will be dynamically rendered here -->
        <div class="empty-state glass">
          <div class="empty-icon">📁</div>
          <h3>No leads found</h3>
          <p>Once clients make enquiries or billings on your website, they will appear here.</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Lead Detail Modal -->
  <div id="leadModal" class="modal-overlay hidden">
    <div class="modal-content glass">
      <div class="modal-header">
        <h3 id="modalTitle">Lead Details</h3>
        <button id="closeModalBtn" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <!-- Dynamic content -->
      </div>
      <div class="modal-footer">
        <button id="modalDeleteBtn" class="btn btn-danger">Delete</button>
        <div class="modal-actions-right">
          <button id="modalContactedBtn" class="btn btn-secondary">Mark Contacted</button>
          <button id="modalCompletedBtn" class="btn btn-success">Mark Completed</button>
        </div>
      </div>
    </div>
  </div>

  <script src="admin.js"></script>
</body>
</html>
