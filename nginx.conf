server {
    listen 80;
    server_name wssbhuj.in www.wssbhuj.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name wssbhuj.in www.wssbhuj.in;

    ssl_certificate /etc/letsencrypt/live/wssbhuj.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wssbhuj.in/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Optimize performance with caching and compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Backend API and dynamic routes
    location / {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Uploads Static Cache config
    location /uploads/ {
        alias /var/www/wss/Uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
