<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Websoft Solutions Control Panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-body">
  <div class="background-decor">
    <div class="bubble bubble-1"></div>
    <div class="bubble bubble-2"></div>
  </div>

  <div class="login-container">
    <div class="login-card glass">
      <div class="login-header">
        <div class="logo-badge">WSS</div>
        <h2>Control Panel</h2>
        <p>Enter your credentials to manage Websoft Solutions</p>
      </div>

      <form id="loginForm" class="login-form">
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" required placeholder="e.g. admin">
        </div>
        
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>

        <div id="errorMessage" class="error-message hidden"></div>

        <button type="submit" class="btn btn-primary btn-block">
          <span>Sign In</span>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </form>
    </div>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('wss_admin_token')) {
      window.location.href = './';
    }

    // Cookie read karne ka helper for CSRF validation
    function getCookie(name) {
      const value = `; ${document.cookie}`;
      const parts = value.split(`; ${name}=`);
      if (parts.length === 2) return parts.pop().split(';').shift();
      return '';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMessage');

      errorMsg.classList.add('hidden');

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-CSRF-Token': getCookie('csrfToken') // Cookie se csrfToken read karke header me send kar rahe hain
          },
          body: JSON.stringify({ username, password })
        });

        const result = await response.json();
        if (response.ok && result.success) {
          localStorage.setItem('wss_admin_token', result.token);
          localStorage.setItem('wss_admin_refresh_token', result.refreshToken);
          localStorage.setItem('wss_admin_user', username);
          window.location.href = './';
        } else {
          errorMsg.textContent = result.error || 'Mera bhai, galat username ya password dala hai!';
          errorMsg.classList.remove('hidden');
        }
      } catch (err) {
        errorMsg.textContent = 'Server se connection fail ho gaya hai.';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
